<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>Login | Wireless Display Console</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <style>
        :root {
            /* ☀️ Daylight Mode Variables */
            --glass-bg: rgba(255, 255, 255, 0.4);
            --glass-border: rgba(0, 0, 0, 0.08);
            --glass-blur: blur(20px);
            --accent: #007AFF;
            --text-main: #1d1d1f;
            --input-bg: rgba(255, 255, 255, 0.65);
            --input-border: rgba(0, 0, 0, 0.12);
            --input-text: #000000;
            --input-placeholder: rgba(0, 0, 0, 0.35);
            --bg-gradient: linear-gradient(-45deg, #e4e8f0, #f5f7fa, #e0e5ec, #f0f4f8);
            --box-shadow: 0 15px 35px rgba(0, 0, 0, 0.06);
        }
        
        @media (prefers-color-scheme: dark) {
            :root {
                /* 🌙 Night Mode Variables */
                --glass-bg: rgba(30, 30, 30, 0.45);
                --glass-border: rgba(255, 255, 255, 0.1);
                --accent: #0A84FF;
                --text-main: #ffffff;
                --input-bg: rgba(0, 0, 0, 0.25);
                --input-border: rgba(255, 255, 255, 0.15);
                --input-text: #ffffff;
                --input-placeholder: rgba(255, 255, 255, 0.4);
                --bg-gradient: linear-gradient(-45deg, #0f172a, #1e1b4b, #000000, #020617);
                --box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            }
        }
        
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg-gradient);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: var(--text-main);
            transition: color 0.4s ease, background 0.4s ease;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .glass-box {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: var(--box-shadow);
            text-align: center;
            width: 90%;
            max-width: 320px;
            transition: all 0.4s ease;
        }

        h2 {
            margin-top: 0;
            margin-bottom: 25px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        input {
            width: 100%;
            box-sizing: border-box;
            padding: 14px 16px;
            margin-bottom: 15px;
            border-radius: 12px;
            border: 1px solid var(--input-border);
            background: var(--input-bg);
            color: var(--input-text);
            font-size: 16px;
            outline: none;
            transition: all 0.3s ease;
        }

        input::placeholder { color: var(--input-placeholder); }
        input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(10, 132, 255, 0.2);
        }

        button {
            width: 100%;
            padding: 14px;
            background: var(--accent);
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
            margin-top: 10px;
        }

        button:active { transform: scale(0.96); opacity: 0.9; }
    </style>
</head>
<body>
    <div class="glass-box">
        <h2>🔒 Wireless Display Console</h2>
        <form action="/do_login" method="GET">
            <input type="text" name="user" placeholder="Username" required autocomplete="username" />
            <input type="password" name="pwd" placeholder="Password" required autocomplete="current-password" />
            <button type="submit">Sign In</button>
        </form>
    </div>
    <script>
        if (window.location.search.includes("err=1")) {
            alert("Invalid username or password!");
        }
    </script>
</body>
</html>
